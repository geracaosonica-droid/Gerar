<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist - Geração Sônica</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            color: #ff8c00;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ff8c00;
        }
        .song-item {
            background: #1a1a1a;
            border: 1px solid #ff8c00;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .song-name {
            color: #fff;
        }
        .play-btn {
            background: #ff8c00;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .back-btn {
            display: block;
            width: 100px;
            margin: 30px auto;
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid #ff8c00;
        }
    </style>
</head>
<body>

<h1>📋 PLAYLIST GERAL</h1>

<div class="song-item">
    <span class="song-name">1. Dança dos Condenados</span>
    <button class="play-btn" onclick="playSong(0)">▶️</button>
</div>

<div class="song-item">
    <span class="song-name">2. Salário de Inflação</span>
    <button class="play-btn" onclick="playSong(1)">▶️</button>
</div>

<div class="song-item">
    <span class="song-name">3. Botão Verde</span>
    <button class="play-btn" onclick="playSong(2)">▶️</button>
</div>

<a href="index.html" class="back-btn">⬅️ VOLTAR</a>

<script>
    const playlist = [
        { name: "Dança dos Condenados", file: "Musica1.mp3" },
        { name: "Salário de Inflação", file: "Musica2.mp3" },
        { name: "Botão Verde", file: "Musica3.mp3" }
    ];

    let audio = new Audio(playlist[0].file);

    function playSong(index) {
        audio.src = playlist[index].file;
        audio.play();
    }
</script>

</body>
</html>
